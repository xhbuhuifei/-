<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>今晚吃什么？🍽️ 外卖or堂食决策器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff9f0 0%, #ffe6d5 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 可爱漂浮装饰 */
        .deco {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            opacity: 0.2;
            z-index: 0;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* 主卡片 */
        .card {
            background-color: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 72px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 215, 180, 0.6);
            max-width: 700px;
            width: 100%;
            padding: 2rem 2rem 2.5rem;
            transition: all 0.3s ease;
            z-index: 10;
            border: 1px solid #fff8;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #F97316, #F59E0B);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
            letter-spacing: -0.5px;
        }

        .header .emoji-bounce {
            display: inline-block;
            animation: bounce 2s infinite;
            font-size: 2.2rem;
            margin-left: 8px;
        }

        @keyframes bounce {
            0%,100%{ transform: translateY(0);}
            50%{ transform: translateY(-8px);}
        }

        .sub {
            color: #b45f2b;
            font-weight: 600;
            background: #ffefdf;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* 决策模式选择器 */
        .mode-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            min-width: 140px;
            background: white;
            border: 3px solid #ffcd94;
            border-radius: 60px;
            padding: 1rem 1.2rem;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            color: #7b3f00;
            background: #fffaf5;
        }

        .mode-btn.active {
            background: #ffb347;
            border-color: #ff9f2e;
            color: white;
            box-shadow: 0 6px 12px rgba(255, 155, 50, 0.3);
            transform: scale(1.02);
        }

        .mode-btn:active {
            transform: scale(0.98);
        }

        /* 结果展示区 */
        .result-area {
            background: #fffaf5;
            border-radius: 68px;
            padding: 1.8rem;
            margin: 1rem 0 1.5rem;
            text-align: center;
            box-shadow: inset 0 2px 5px #ffd9bf, 0 12px 20px -10px rgba(0,0,0,0.1);
            border: 2px dashed #ffc896;
            transition: all 0.2s;
        }

        .food-icon {
            font-size: 5rem;
            filter: drop-shadow(4px 6px 8px rgba(0,0,0,0.1));
            margin-bottom: 0.5rem;
        }

        .food-name {
            font-size: 2rem;
            font-weight: 800;
            color: #55280c;
            background: #fff2e6;
            display: inline-block;
            padding: 0.2rem 1.4rem;
            border-radius: 80px;
            word-break: break-word;
            max-width: 100%;
            margin-top: 6px;
        }

        .decision-hint {
            font-size: 0.85rem;
            color: #e18f4a;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* 按钮区域 */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0 1rem;
        }

        .btn {
            border: none;
            padding: 0.8rem 1.6rem;
            border-radius: 80px;
            font-size: 1.1rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #d9b48b;
            font-family: inherit;
            color: #5a2e0e;
            background: white;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #d9b48b;
        }

        .btn-primary {
            background: #ffb347;
            color: white;
            box-shadow: 0 6px 0 #c46f1a;
        }

        .btn-primary:active {
            background: #fca32e;
        }

        .btn-secondary {
            background: #fde68a;
            box-shadow: 0 6px 0 #c79a3e;
            color: #7b3f00;
        }

        /* 当前菜单展示 */
        .menu-preview {
            background: #fff3e9;
            border-radius: 48px;
            padding: 1rem 1.5rem;
            margin-top: 1.2rem;
        }

        .menu-title {
            font-weight: 700;
            color: #be6a2c;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .menu-items {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .menu-tag {
            background: white;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            color: #7a4316;
            border: 1px solid #ffc691;
        }

        .menu-tag .emoji {
            font-size: 1.1rem;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #c28954;
            margin-top: 1.8rem;
            border-top: 1px solid #ffddbc;
            padding-top: 1rem;
        }

        @keyframes shakePop {
            0% { transform: scale(1); }
            25% { transform: scale(1.05) rotate(1deg);}
            50% { transform: scale(0.98) rotate(-1deg);}
            100% { transform: scale(1);}
        }

        .pop-effect {
            animation: shakePop 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @media (max-width: 550px) {
            .card {
                padding: 1.5rem;
            }
            .food-name {
                font-size: 1.3rem;
            }
            .food-icon {
                font-size: 3.8rem;
            }
            .mode-btn {
                font-size: 1rem;
                padding: 0.7rem;
                min-width: 110px;
            }
            .btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<!-- 飘浮可爱食物装饰 -->
<div class="deco" style="top: 10%; left: 5%; font-size: 2.8rem;">🍜</div>
<div class="deco" style="bottom: 12%; right: 3%; font-size: 2.5rem; animation-duration: 8s;">🍕</div>
<div class="deco" style="top: 30%; right: 8%; font-size: 2rem; animation-duration: 7s;">🥡</div>
<div class="deco" style="bottom: 20%; left: 6%; font-size: 2rem; animation-duration: 9s;">🍛</div>
<div class="deco" style="top: 65%; left: 85%; font-size: 2.2rem;">🚶</div>

<div class="card">
    <div class="header">
        <h1>
            今晚吃什么
            <span class="emoji-bounce">🤔</span>
        </h1>
        <div class="sub">✨ 先选方式 · 再随机决定 ✨</div>
    </div>

    <!-- 决策模式切换 -->
    <div class="mode-selector">
        <button class="mode-btn" id="takeoutModeBtn">
            🛵 点外卖
        </button>
        <button class="mode-btn" id="dineoutModeBtn">
            🚶‍♀️ 出去吃
        </button>
    </div>

    <!-- 随机结果展示区 -->
    <div class="result-area" id="resultArea">
        <div class="food-icon" id="foodIcon">🍽️</div>
        <div class="food-name" id="foodName">点击🎲开始决定吧</div>
        <div class="decision-hint">
            <span>⭐</span> <span id="modeHint">当前未选择模式</span> <span>⭐</span>
        </div>
    </div>

    <!-- 主要操作按钮 -->
    <div class="action-buttons">
        <button class="btn btn-primary" id="randomBtn">
            🎲 随机决定 🍴
        </button>
    </div>

    <!-- 菜单预览区 - 显示当前模式下的选项 -->
    <div class="menu-preview">
        <div class="menu-title">
            <span>📋</span>
            <span id="menuPreviewTitle">当前菜单</span>
            <span>✨</span>
        </div>
        <div id="menuItemsContainer" class="menu-items">
            <!-- 动态渲染菜单选项 -->
        </div>
    </div>

    <footer>
        🐻 纠结终结者 · 让晚餐充满惊喜  🐣
    </footer>
</div>

<script>
    // ==================== 数据结构 ====================
    // 外卖选项
    const TAKEOUT_OPTIONS = [
        { name: "大圣烧烤", icon: "🍢", desc: "滋滋冒油的烤串，夜宵王者！" },
        { name: "张亮麻辣烫", icon: "🥘", desc: "自选食材，热辣鲜香" },
        { name: "脆骨炒饭", icon: "🍚", desc: "香脆可口，粒粒分明" }
    ];

    // 出去吃选项
    const DINEOUT_OPTIONS = [
        { name: "金银潭", icon: "🏬", desc: "商场美食区，选择超多" },
        { name: "去后面", icon: "🏘️", desc: "后街小店，烟火气十足" },
        { name: "去小区门口", icon: "🚪", desc: "家门口的美味，方便快捷" }
    ];

    // 当前模式: 'takeout' 或 'dineout'
    let currentMode = 'takeout';

    // DOM 元素
    const takeoutModeBtn = document.getElementById('takeoutModeBtn');
    const dineoutModeBtn = document.getElementById('dineoutModeBtn');
    const randomBtn = document.getElementById('randomBtn');
    const foodIconEl = document.getElementById('foodIcon');
    const foodNameEl = document.getElementById('foodName');
    const modeHintSpan = document.getElementById('modeHint');
    const menuPreviewTitle = document.getElementById('menuPreviewTitle');
    const menuItemsContainer = document.getElementById('menuItemsContainer');
    const resultArea = document.getElementById('resultArea');

    // 获取当前模式的选项列表
    function getCurrentOptions() {
        return currentMode === 'takeout' ? TAKEOUT_OPTIONS : DINEOUT_OPTIONS;
    }

    // 获取当前模式的名称（中文）
    function getModeName() {
        return currentMode === 'takeout' ? '点外卖' : '出去吃';
    }

    // 获取当前模式的图标
    function getModeIcon() {
        return currentMode === 'takeout' ? '🛵' : '🚶‍♀️';
    }

    // 更新UI：高亮选中的模式按钮
    function updateModeButtonsUI() {
        if (currentMode === 'takeout') {
            takeoutModeBtn.classList.add('active');
            dineoutModeBtn.classList.remove('active');
        } else {
            dineoutModeBtn.classList.add('active');
            takeoutModeBtn.classList.remove('active');
        }
    }

    // 更新菜单预览区
    function updateMenuPreview() {
        const options = getCurrentOptions();
        const modeName = getModeName();
        const modeIcon = getModeIcon();

        menuPreviewTitle.innerHTML = `${modeIcon} ${modeName}选项 ${modeIcon}`;

        // 清空并重新渲染菜单标签
        menuItemsContainer.innerHTML = '';
        options.forEach(option => {
            const tag = document.createElement('div');
            tag.className = 'menu-tag';
            tag.innerHTML = `
                <span class="emoji">${option.icon}</span>
                <span>${option.name}</span>
            `;
            menuItemsContainer.appendChild(tag);
        });

        // 更新提示文字
        modeHintSpan.innerHTML = `当前模式：${modeName} ${modeIcon}`;
    }

    // 添加弹出特效
    function addPopEffect() {
        resultArea.classList.add('pop-effect');
        setTimeout(() => {
            resultArea.classList.remove('pop-effect');
        }, 300);
    }

    // 随机选择当前模式下的一个选项
    function pickRandom() {
        const options = getCurrentOptions();

        if (!options || options.length === 0) {
            foodNameEl.innerText = "暂无选项~";
            foodIconEl.innerText = "😿";
            addPopEffect();
            return;
        }

        const randomIndex = Math.floor(Math.random() * options.length);
        const chosen = options[randomIndex];

        // 更新显示
        foodNameEl.innerHTML = `${chosen.name}`;
        foodIconEl.innerHTML = chosen.icon;

        // 添加一段有趣的描述（可选）
        if (chosen.desc) {
            const hintSpan = document.querySelector('.decision-hint span:first-child');
            // 不覆盖modeHint，只是额外显示一个临时效果
        }

        addPopEffect();

        // 给随机按钮一个微小的按压动画
        randomBtn.style.transform = "scale(0.96)";
        setTimeout(() => { randomBtn.style.transform = ""; }, 150);

        // 可爱的小彩蛋：控制台输出推荐理由
        console.log(`🍽️ 今晚${getModeName()}推荐：${chosen.name} ${chosen.desc ? '—— ' + chosen.desc : ''}`);
    }

    // 切换模式
    function setMode(mode) {
        if (mode !== 'takeout' && mode !== 'dineout') return;
        currentMode = mode;

        // 更新UI
        updateModeButtonsUI();
        updateMenuPreview();

        // 切换模式后，自动随机一次，让用户看到新模式的选项
        pickRandom();

        // 添加一个轻柔的提示效果
        const modeHint = modeHintSpan;
        modeHint.style.transform = "scale(1.05)";
        setTimeout(() => { modeHint.style.transform = ""; }, 200);
    }

    // 初始化页面，如果之前有选择记录就恢复（可选）
    function init() {
        // 设置默认模式为点外卖（更符合第一直觉）
        currentMode = 'takeout';
        updateModeButtonsUI();
        updateMenuPreview();

        // 随机显示一个初始选项
        const options = getCurrentOptions();
        if (options.length > 0) {
            const randomIndex = Math.floor(Math.random() * options.length);
            const initial = options[randomIndex];
            foodNameEl.innerHTML = initial.name;
            foodIconEl.innerHTML = initial.icon;
        } else {
            foodNameEl.innerHTML = "准备好啦！";
            foodIconEl.innerHTML = "🍽️";
        }

        modeHintSpan.innerHTML = `当前模式：点外卖 🛵`;
    }

    // 绑定事件
    takeoutModeBtn.addEventListener('click', () => {
        setMode('takeout');
    });

    dineoutModeBtn.addEventListener('click', () => {
        setMode('dineout');
    });

    randomBtn.addEventListener('click', () => {
        pickRandom();
    });

    // 键盘快捷键支持：按 R 键随机，按 T 切换外卖，按 D 切换出去吃
    document.addEventListener('keydown', (e) => {
        if (e.key === 'r' || e.key === 'R') {
            e.preventDefault();
            pickRandom();
            // 可爱反馈：按钮闪烁
            randomBtn.style.backgroundColor = "#ffa559";
            setTimeout(() => { randomBtn.style.backgroundColor = ""; }, 150);
        } else if (e.key === 't' || e.key === 'T') {
            e.preventDefault();
            setMode('takeout');
            takeoutModeBtn.style.transform = "scale(0.96)";
            setTimeout(() => { takeoutModeBtn.style.transform = ""; }, 150);
        } else if (e.key === 'd' || e.key === 'D') {
            e.preventDefault();
            setMode('dineout');
            dineoutModeBtn.style.transform = "scale(0.96)";
            setTimeout(() => { dineoutModeBtn.style.transform = ""; }, 150);
        }
    });

    // 启动
    init();
</script>
</body>
</html>
